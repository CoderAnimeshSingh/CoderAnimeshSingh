<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartSpend AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>SmartSpend AI</h1>
      <p>Personal Finance & Expense Intelligence Platform</p>
    </header>

    <main>
      <section class="card" id="authCard">
        <h2>Login / Register</h2>
        <input id="name" placeholder="Name (for register)" />
        <input id="email" placeholder="Email" type="email" />
        <input id="password" placeholder="Password" type="password" />
        <div class="row">
          <button id="registerBtn">Register</button>
          <button id="loginBtn">Login</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </section>

      <section class="card">
        <h2>Add Transaction</h2>
        <div class="grid">
          <input id="amount" type="number" step="0.01" placeholder="Amount" />
          <select id="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <input id="date" type="date" />
          <select id="category"></select>
        </div>
        <input id="note" placeholder="Optional note" />
        <button id="addTransactionBtn">Add</button>
      </section>

      <section class="card">
        <h2>Budget</h2>
        <div class="row">
          <input id="month" type="month" />
          <input id="budget" type="number" placeholder="Monthly budget amount" />
          <button id="saveBudgetBtn">Save Budget</button>
        </div>
      </section>

      <section class="card metrics">
        <h2>Dashboard</h2>
        <div class="kpis">
          <article><h3>Income</h3><p id="income">₹0</p></article>
          <article><h3>Expense</h3><p id="expense">₹0</p></article>
          <article><h3>Savings</h3><p id="savings">₹0</p></article>
          <article><h3>Budget</h3><p id="budgetView">₹0</p></article>
        </div>
        <p id="insight" class="insight"></p>
        <button id="refreshDashboardBtn" class="secondary">Refresh Dashboard</button>
      </section>

      <section class="card">
        <h2>Transaction History</h2>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="transactionsBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="status">Ready.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
